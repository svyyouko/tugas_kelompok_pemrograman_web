<!DOCTYPE html> <!-- Mendefinisikan bahwa dokumen ini menggunakan HTML5 -->
<html lang="id"> <!-- Menentukan bahasa utama halaman adalah Bahasa Indonesia -->

<head>
    <title>Form Mahasiswa</title> <!-- Menampilkan judul pada tab browser -->

    <!-- ===================== CSS (TAMPILAN) ===================== -->
    <style>
        .action-img {
    width: 20px; /* ukuran ikon */
    cursor: pointer; /* kursor jadi tangan */
    margin: 0 5px; /* jarak antar ikon */
}

.action-img:hover {
    transform: scale(1.2); /* efek zoom */
}
    body {
        font-family: Arial; /* Mengatur jenis huruf agar mudah dibaca */
        margin: 0; /* Menghilangkan jarak luar default browser */
        padding: 20px; /* Memberikan ruang di dalam halaman */
        background: #eef9e7; /* Memberikan warna latar belakang hijau */
    }

    .container {
        max-width: 800px; /* Membatasi lebar konten agar tidak terlalu melebar */
        margin: auto; /* Menempatkan konten di tengah halaman */
    }

    h2 {
        text-align: center; /* Membuat teks judul berada di tengah */
    }

    form {
        background: #f7d2ed; /* Memberikan warna latar form */
        padding: 25px; /* Memberikan ruang di dalam form */
        border-radius: 15px; /* Membuat sudut form menjadi melengkung */
        margin-bottom: 25px; /* Memberikan jarak antara form dan tabel */
        box-shadow: 0 8px 20px rgba(0,0,0,0.2); /* Menambahkan efek bayangan agar terlihat seperti card */
    }

    .row {
        display: flex; /* Mengatur elemen agar sejajar secara horizontal */
        gap: 10px; /* Memberikan jarak antar input */
    }

    .row input,
    .row select {
        flex: 1; /* Membuat setiap elemen memiliki ukuran yang sama */
    }

    input, textarea, select {
        width: 100%; /* Membuat input memenuhi lebar container */
        padding: 10px; /* Memberikan ruang di dalam input */
        margin: 5px 0 15px; /* Memberikan jarak antar elemen */
        border-radius: 8px; /* Membulatkan sudut input */
        border: none; /* Menghilangkan garis tepi default */
        outline: none; /* Menghilangkan garis saat input diklik */
    }

    .radio {
    display: flex;
    justify-content: space-between; /* kiri & kanan */
    align-items: center;
    }

.radio-group {
    display: flex;
    gap: 20px;
    }

    button {
        padding: 10px 15px; /* Mengatur ukuran tombol */
        margin-right: 5px; /* Memberikan jarak antar tombol */
        border: none; /* Menghilangkan garis tepi tombol */
        border-radius: 8px; /* Membulatkan sudut tombol */
        cursor: pointer; /* Mengubah cursor menjadi tangan saat diarahkan */
        font-weight: bold; /* Membuat teks tombol lebih tegas */
    }

    .submit {
        background: rgb(6, 128, 20); /* Warna hijau untuk tombol submit */
        color: white; /* Warna teks putih agar kontras */
    }

    .reset {
        background: rgb(252, 12, 28); /* Warna merah untuk tombol reset */
        color: white;
    }

    table {
        width: 100%; /* Membuat tabel memenuhi lebar container */
        border-collapse: collapse; /* Menggabungkan garis tabel */
        background: #f8f8f8; /* Warna latar tabel */
        border-radius: 20px; /* (FIX kecil typo dari code kamu) */
        overflow: hidden; /* Menyembunyikan bagian yang keluar */
        box-shadow: 0 8px 20px rgba(0,0,0,0.2); /* Memberikan efek bayangan */
    }

    th {
        background: rgba(0,0,0,0.2); /* Warna latar header tabel */
        color: white; /* Warna teks header */
    }

    th, td {
        padding: 10px; /* Memberikan ruang di dalam sel tabel */
        text-align: center; /* Mengatur teks berada di tengah */
    }

    /* ===== TAMBAHAN: STYLE SEARCH ===== */
    #search {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 8px;
    }
    </style>
</head>

<!-- ===================== HTML (STRUKTUR) ===================== -->
<body>

<div class="container">

<h2>Form Data Mahasiswa</h2>

<form id="formMahasiswa">

    <div class="row">
        <input type="text" id="nim" placeholder="NIM" required>
        <input type="text" id="nama" placeholder="Nama" required>
    </div>

    <textarea id="alamat" placeholder="Alamat"></textarea>

    <div class="radio">
    <label>Jenis Kelamin:</label>

    <div class="radio-group">
        <label><input type="radio" name="jk" value="Pria"> Pria</label>
        <label><input type="radio" name="jk" value="Wanita"> Wanita</label>
    </div>
</div>

    <div class="row">
    <label>Tanggal Lahir:</label>
        <select id="tanggal"></select>
        <select id="bulan"></select>
        <select id="tahun"></select>
    </div>

    <input type="password" id="password" placeholder="Password">

    <button type="submit" class="submit" id="btnSubmit">Submit</button>
    <button type="reset" class="reset">Reset</button>

</form>

<h2>Data Mahasiswa</h2>

<!-- ===== TAMBAHAN SEARCH ===== -->
<input type="text" id="search" placeholder="Cari Nama atau NIM...">

<table>
    <thead>
        <tr>
            <th>NIM</th>
            <th>Nama</th>
            <th>Alamat</th>
            <th>JK</th>
            <th>TL</th>
            <th>Password</th>
            <th>Aksi</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

</div>

<!-- ===================== JAVASCRIPT (FUNGSI) ===================== -->
<script>
const form = document.getElementById("formMahasiswa");
const tableBody = document.getElementById("tableBody");
const btnSubmit = document.getElementById("btnSubmit");

let editRow = null;

const tanggal = document.getElementById("tanggal");
for (let i = 1; i <= 31; i++) {
    let val = i.toString().padStart(2, "0");
    tanggal.innerHTML += `<option value="${val}">${val}</option>`;
}

const bulan = document.getElementById("bulan");
const namaBulan = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
namaBulan.forEach((b, i) => {
    let val = (i+1).toString().padStart(2, "0");
    bulan.innerHTML += `<option value="${val}">${b}</option>`;
});

const tahun = document.getElementById("tahun");
for (let i = 1980; i <= 2026; i++) {
    tahun.innerHTML += `<option value="${i}">${i}</option>`;
}

/* ===================== SUBMIT DATA ===================== */
form.addEventListener("submit", function(e) {
    e.preventDefault();

    /* ===== TAMBAHAN KONFIRMASI ===== */
    if (!confirm("Apakah data sudah valid?")) return;

    const nim = document.getElementById("nim").value;
    const nama = document.getElementById("nama").value;
    const alamat = document.getElementById("alamat").value;
    const password = document.getElementById("password").value;

    const jk = document.querySelector('input[name="jk"]:checked');
    const jenisKelamin = jk ? jk.value : "-";

    const tl = `${tanggal.value}-${bulan.value}-${tahun.value}`;

    if (editRow) {
        editRow.cells[0].innerText = nim;
        editRow.cells[1].innerText = nama;
        editRow.cells[2].innerText = alamat;
        editRow.cells[3].innerText = jenisKelamin;
        editRow.cells[4].innerText = tl;
        editRow.cells[5].innerText = password;

        editRow = null;
        btnSubmit.innerText = "Submit";
    } else {
        const row = document.createElement("tr");

        row.innerHTML = `
        <td>${nim}</td>
        <td>${nama}</td>
        <td>${alamat}</td>
        <td>${jenisKelamin}</td>
        <td>${tl}</td>
        <td>${password}</td>
        <td>
            <img src="https://cdn-icons-png.flaticon.com/512/5935/5935145.png" 
            class="action-img" onclick="editData(this)">
            <img src="https://cdn-icons-png.flaticon.com/512/6861/6861362.png" 
            class="action-img" onclick="hapusData(this)">
        </td>`;

        tableBody.appendChild(row);
    }

    form.reset();
});

/* ===================== HAPUS DATA ===================== */
function hapusData(btn) {
    /* ===== TAMBAHAN KONFIRMASI ===== */
    if (confirm("Yakin ingin menghapus data?")) {
        btn.parentElement.parentElement.remove();
    }
}
/* ===================== EDIT DATA ===================== */
function editData(btn) {
    editRow = btn.parentElement.parentElement; 
    // Mengambil baris (row) dari tabel berdasarkan tombol yang diklik

    document.getElementById("nim").value = editRow.cells[0].innerText; 
    // Mengisi input NIM dengan data dari tabel

    document.getElementById("nama").value = editRow.cells[1].innerText; 
    // Mengisi input Nama

    document.getElementById("alamat").value = editRow.cells[2].innerText; 
    // Mengisi input Alamat

    const jkValue = editRow.cells[3].innerText;
    // Mengambil nilai jenis kelamin dari tabel

    document.querySelectorAll('input[name="jk"]').forEach(r => {
        r.checked = (r.value === jkValue); 
        // Menyesuaikan radio button sesuai data sebelumnya
    });

    const ttl = editRow.cells[4].innerText.split("-");
    // Memecah tanggal lahir menjadi array [tanggal, bulan, tahun]

    tanggal.value = ttl[0];
    bulan.value = ttl[1];
    tahun.value = ttl[2];
    // Mengisi kembali dropdown tanggal, bulan, tahun

    document.getElementById("password").value = editRow.cells[5].innerText;
    // Mengisi kembali password

    btnSubmit.innerText = "Update"; 
    // Mengubah tombol submit menjadi mode update
}
/* ===================== SEARCH DATA ===================== */
document.getElementById("search").addEventListener("keyup", function() {

    let filter = this.value.toLowerCase();
    let rows = tableBody.getElementsByTagName("tr");

    for (let i = 0; i < rows.length; i++) {
        let nim = rows[i].cells[0].innerText.toLowerCase();
        let nama = rows[i].cells[1].innerText.toLowerCase();

        rows[i].style.display = (nim.includes(filter) || nama.includes(filter)) ? "" : "none";
    }
});
</script>

</body>
</html>
